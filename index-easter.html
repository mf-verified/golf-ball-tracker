<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Påskägg Tracker 🐣</title>
    <style>
        /* --- BASE SYSTEM STYLES (Keep These) --- */
        :root {
            --bg-color: #0d0d0d;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color);
            color: white; font-family: 'Inter', system-ui, sans-serif;
            height: 100vh; width: 100vw; overflow: hidden; display: flex;
        }
        .stage { display: flex; width: 100%; height: 100%; z-index: 2; }
        .container-wrapper {
            flex: 1; height: 100%; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .counter-label { font-size: clamp(3rem, 10vw, 7rem); font-weight: 900; margin-bottom: 0; line-height: 1; }
        .label-text { font-size: 1.2rem; color: #555; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 5px; }
        .jar {
            position: relative; width: 90%; height: 60vh;
            background: var(--glass-bg); border: 4px solid var(--glass-border);
            border-top: none; border-radius: 0 0 50px 50px;
            backdrop-filter: blur(10px); padding: 10px; box-sizing: border-box;
            display: flex; flex-wrap: wrap-reverse; align-content: flex-start;
            justify-content: center; overflow: hidden; margin-bottom: 40px;
        }
        .ball { border-radius: 50%; margin: 1px; flex-shrink: 0; box-shadow: inset -4px -4px 6px rgba(0,0,0,0.3); }
        .red { background: radial-gradient(circle at 35% 35%, #ff4d4d, #800000); }
        .green { background: radial-gradient(circle at 35% 35%, #4dff4d, #005000); }
        .blue { background: radial-gradient(circle at 35% 35%, #4db8ff, #002b80); }

        /* --- EASTER THEME V2 (Delete this block to go back to normal) --- */
        body.easter-theme {
            background-color: #fdfae6; /* Soft cream background */
            background-image: radial-gradient(#f0e68c 1px, transparent 1px);
            background-size: 40px 40px;
            color: #5d4037;
        }
        .easter-theme .label-text { color: #8d6e63; font-weight: bold; }
        .easter-theme .jar { 
            background: rgba(255, 255, 255, 0.4); 
            border-color: rgba(141, 110, 99, 0.3); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        /* Make balls look like Eggs */
        .easter-theme .ball {
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform: rotate(calc(var(--r, 0) * 1deg));
        }
        /* Easter Colors */
        .easter-theme .red { background: radial-gradient(circle at 35% 35%, #ff8a80, #d32f2f); }
        .easter-theme .green { background: radial-gradient(circle at 35% 35%, #b9f6ca, #388e3c); }
        .easter-theme .blue { background: radial-gradient(circle at 35% 35%, #81d4fa, #1976d2); }
        
        .easter-header {
            position: absolute; top: 20px; width: 100%; text-align: center;
            font-size: 2.5rem; font-weight: bold; color: #5d4037; z-index: 10;
            font-family: 'Comic Sans MS', cursive; /* Optional: fun font */
        }
        /* Decoration: Feathers (Påskris) */
        .feather {
            position: absolute; width: 40px; height: 100px; 
            border-radius: 50% 50% 20% 20%; z-index: 1; opacity: 0.7;
        }
        /* --- END EASTER THEME --- */

    </style>
</head>
<!-- To remove theme: Change <body class="easter-theme"> to <body> -->
<body class="easter-theme">

    <div class="easter-header">Glad Påsk! 🐥</div>

    <!-- Random Feathers Background Decoration -->
    <div class="feather" style="background:#ffeb3b; top:20%; left:10%; transform:rotate(45deg);"></div>
    <div class="feather" style="background:#f48fb1; top:15%; left:15%; transform:rotate(30deg);"></div>
    <div class="feather" style="background:#90caf9; top:10%; right:10%; transform:rotate(-45deg);"></div>

    <div class="stage">
        <div class="container-wrapper">
            <div id="count-red" class="counter-label">0</div>
            <div class="label-text">Röda Ägg</div>
            <div id="jar-red" class="jar"></div>
        </div>

        <div class="container-wrapper">
            <div id="count-mixed" class="counter-label">0</div>
            <div class="label-text">Blandade Ägg</div>
            <div id="jar-mixed" class="jar"></div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTei2ZyJcEUL0LOH-_5IFqjdhN_CUUKHZJCgDGsestEjzuX-C9ifRu9VrT0ChJRPWSbbfQTVSCd2cw/pub?gid=0&single=true&output=csv';

        async function updateDisplay() {
            try {
                const response = await fetch(CSV_URL + '&t=' + new Date().getTime());
                const data = await response.text();
                const rows = data.split('\n').map(r => r.trim()).filter(r => r.length > 0);
                if (rows.length < 2) return;

                const values = rows[1].split(',');
                const redCount = parseInt(values[0]) || 0;
                const greenCount = parseInt(values[1]) || 0;
                const blueCount = parseInt(values[2]) || 0;
                const mixedCount = greenCount + blueCount;

                document.getElementById('count-red').innerText = redCount.toLocaleString();
                document.getElementById('count-mixed').innerText = mixedCount.toLocaleString();

                const maxCount = Math.max(redCount, mixedCount);
                const jarElement = document.getElementById('jar-red');
                const jarArea = (jarElement.clientWidth - 20) * (jarElement.clientHeight - 20);

                let ballArea = (jarArea / maxCount) * 0.75; // Smaller multiplier for eggs
                let ballSize = Math.sqrt(ballArea);
                ballSize = Math.max(Math.min(ballSize, 70), 6);

                renderJar('jar-red', redCount, ['red'], ballSize);

                const mixedColors = [];
                for(let i=0; i < greenCount; i++) mixedColors.push('green');
                for(let i=0; i < blueCount; i++) mixedColors.push('blue');
                mixedColors.sort(() => Math.random() - 0.5);
                renderJar('jar-mixed', mixedCount, mixedColors, ballSize);

            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        function renderJar(jarId, count, colorArray, size) {
            const jar = document.getElementById(jarId);
            jar.innerHTML = '';
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < count; i++) {
                const ball = document.createElement('div');
                const color = colorArray.length > 1 ? colorArray[i] : colorArray[0];
                ball.className = 'ball ' + color;
                ball.style.width = size + 'px';
                ball.style.height = (size * 1.3) + 'px'; // Eggs are taller than they are wide
                
                // Add a random rotation to the eggs for a messy look
                const rotation = Math.floor(Math.random() * 60) - 30;
                ball.style.setProperty('--r', rotation);
                
                fragment.appendChild(ball);
            }
            jar.appendChild(fragment);
        }

        window.addEventListener('resize', updateDisplay);
        updateDisplay();
        setInterval(updateDisplay, 30000);
    </script>
</body>
</html>
