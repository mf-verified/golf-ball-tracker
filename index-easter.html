<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Golf Ball Tracker</title>
        <style>
            /* --- BASE SYSTEM & STANDARD THEME (Accessible) --- */
            :root {
                --bg-color: #0d0d0d;
                --glass-bg: rgba(255, 255, 255, 0.08);
                --glass-border: rgba(255, 255, 255, 0.2);
                --text-main: #ffffff;
                --text-sub: #666;
            }

            body {
                margin: 0;
                padding: 0;
                background-color: var(--bg-color);
                color: var(--text-main);
                font-family: "Inter", system-ui, sans-serif;
                height: 100vh;
                width: 100vw;
                overflow: hidden;
                display: flex;
            }

            .stage {
                display: flex;
                width: 100%;
                height: 100%;
                z-index: 2;
            }
            .container-wrapper {
                flex: 1;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                align-items: center;
                padding: 20px;
                box-sizing: border-box;
            }

            .counter-label {
                font-size: clamp(3rem, 10vw, 7rem);
                font-weight: 900;
                margin-bottom: 0;
                line-height: 1;
            }
            .label-text {
                font-size: 1.2rem;
                color: var(--text-sub);
                margin-bottom: 20px;
                text-transform: uppercase;
                letter-spacing: 5px;
            }

            .jar {
                position: relative;
                width: 90%;
                height: 65vh;
                background: var(--glass-bg);
                border: 4px solid var(--glass-border);
                border-top: none;
                border-radius: 0 0 50px 50px;
                backdrop-filter: blur(10px);
                padding: 10px;
                box-sizing: border-box;
                display: flex;
                flex-wrap: wrap-reverse;
                align-content: flex-start;
                justify-content: center;
                overflow: hidden;
                margin-bottom: 40px;
            }

            /* ACCESSIBLE GOLF BALLS (Standard Theme) */
            .ball {
                border-radius: 50%;
                margin: 1px;
                flex-shrink: 0;
                box-shadow: inset -3px -3px 5px rgba(0, 0, 0, 0.5);
                border: 1px solid rgba(255, 255, 255, 0.1); /* Edge definition */
            }

            /* RED: Standard high-gloss */
            .red {
                background: radial-gradient(
                    circle at 35% 35%,
                    #ff4d4d,
                    #800000
                );
            }

            /* GREEN: High-Contrast Lime with "Dimple" Texture (Dots) */
            .green {
                background:
                    radial-gradient(
                        circle,
                        rgba(255, 255, 255, 0.15) 1px,
                        transparent 1px
                    ),
                    radial-gradient(circle at 35% 35%, #b2ff59, #33691e);
                background-size:
                    6px 6px,
                    100% 100%;
            }

            /* BLUE: Deep Sky Blue with "Dual Shine" Pattern (Diagonal Stripe) */
            .blue {
                background:
                    linear-gradient(
                        135deg,
                        transparent 40%,
                        rgba(255, 255, 255, 0.3) 50%,
                        transparent 60%
                    ),
                    radial-gradient(circle at 35% 35%, #40c4ff, #01579b);
            }

            /* --- EASTER THEME V2 (Accessible) --- */
            body.easter-theme {
                background-color: #fdfae6;
                color: #4e342e;
            }
            .easter-theme .label-text {
                color: #8d6e63;
            }
            .easter-theme .jar {
                background: rgba(255, 255, 255, 0.4);
                border-color: rgba(141, 110, 99, 0.3);
            }
            .easter-theme .ball {
                border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
                transform: rotate(calc(var(--r, 0) * 1deg));
                height: 1.3em; /* Eggs are taller */
            }
            .easter-theme .red {
                background: radial-gradient(
                    circle at 35% 35%,
                    #ff8a80,
                    #d32f2f
                );
            }
            .easter-theme .green {
                background:
                    radial-gradient(
                        circle,
                        rgba(0, 0, 0, 0.05) 1px,
                        transparent 3px
                    ),
                    radial-gradient(circle at 35% 35%, #dce775, #558b2f);
                background-size:
                    8px 8px,
                    100% 100%;
            }
            .easter-theme .blue {
                background:
                    linear-gradient(
                        0deg,
                        transparent 48%,
                        rgba(255, 255, 255, 0.3) 50%,
                        transparent 52%
                    ),
                    radial-gradient(circle at 35% 35%, #81d4fa, #0277bd);
                background-size:
                    100% 10px,
                    100% 100%;
            }
            .easter-header {
                display: none;
            }
            body.easter-theme .easter-header {
                display: block;
                position: absolute;
                top: 20px;
                width: 100%;
                text-align: center;
                font-size: 2.5rem;
                font-weight: bold;
                color: #5d4037;
                z-index: 10;
                font-family: cursive;
            }
        </style>
    </head>

    <!-- CHANGE THIS TO <body class=""> TO REMOVE THE EASTER THEME -->
    <body class="easter-theme">
        <div class="easter-header">Glad Påsk! 🐣</div>

        <div class="stage">
            <div class="container-wrapper">
                <div id="count-red" class="counter-label">0</div>
                <div class="label-text">Red Count</div>
                <div id="jar-red" class="jar"></div>
            </div>

            <div class="container-wrapper">
                <div id="count-mixed" class="counter-label">0</div>
                <div class="label-text">Mixed Count</div>
                <div id="jar-mixed" class="jar"></div>
            </div>
        </div>

        <script>
            const CSV_URL =
                "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTei2ZyJcEUL0LOH-_5IFqjdhN_CUUKHZJCgDGsestEjzuX-C9ifRu9VrT0ChJRPWSbbfQTVSCd2cw/pub?gid=0&single=true&output=csv";

            async function updateDisplay() {
                try {
                    const response = await fetch(
                        CSV_URL + "&t=" + new Date().getTime(),
                    );
                    const data = await response.text();
                    const rows = data
                        .split("\n")
                        .map((r) => r.trim())
                        .filter((r) => r.length > 0);
                    if (rows.length < 2) return;

                    const values = rows[1].split(",");
                    const redCount = parseInt(values[0]) || 0;
                    const greenCount = parseInt(values[1]) || 0;
                    const blueCount = parseInt(values[2]) || 0;
                    const mixedCount = greenCount + blueCount;

                    document.getElementById("count-red").innerText =
                        redCount.toLocaleString();
                    document.getElementById("count-mixed").innerText =
                        mixedCount.toLocaleString();

                    const maxCount = Math.max(redCount, mixedCount);
                    const jarElement = document.getElementById("jar-red");
                    const jarArea =
                        (jarElement.clientWidth - 20) *
                        (jarElement.clientHeight - 20);

                    let ballArea = (jarArea / maxCount) * 0.78;
                    let ballSize = Math.sqrt(ballArea);
                    ballSize = Math.max(Math.min(ballSize, 70), 6);

                    renderJar("jar-red", redCount, ["red"], ballSize);

                    const mixedColors = [];
                    for (let i = 0; i < greenCount; i++)
                        mixedColors.push("green");
                    for (let i = 0; i < blueCount; i++)
                        mixedColors.push("blue");
                    mixedColors.sort(() => Math.random() - 0.5);
                    renderJar("jar-mixed", mixedCount, mixedColors, ballSize);
                } catch (e) {
                    console.error("Fetch error:", e);
                }
            }

            function renderJar(jarId, count, colorArray, size) {
                const jar = document.getElementById(jarId);
                jar.innerHTML = "";
                const fragment = document.createDocumentFragment();
                const isEaster =
                    document.body.classList.contains("easter-theme");

                for (let i = 0; i < count; i++) {
                    const ball = document.createElement("div");
                    const color =
                        colorArray.length > 1 ? colorArray[i] : colorArray[0];
                    ball.className = "ball " + color;

                    ball.style.width = size + "px";
                    ball.style.height = isEaster
                        ? size * 1.35 + "px"
                        : size + "px";

                    if (isEaster) {
                        const rotation = Math.floor(Math.random() * 60) - 30;
                        ball.style.setProperty("--r", rotation);
                    }

                    fragment.appendChild(ball);
                }
                jar.appendChild(fragment);
            }

            window.addEventListener("resize", updateDisplay);
            updateDisplay();
            setInterval(updateDisplay, 30000);
        </script>
    </body>
</html>
